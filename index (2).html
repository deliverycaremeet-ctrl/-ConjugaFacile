*{box-sizing:border-box;margin:0;padding:0;}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
input:focus{outline:none;}

::-webkit-scrollbar-thumb{background:#D1D9E0;border-radius:2px;}

function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function pick20(tipo){
  const DB=tipo==="B"?DB_B:DB_A;
  const res=[];
  CATS.forEach(c=>{const pool=shuffle(DB.filter(d=>d.cat===c));res.push(...pool.slice(0,Math.ceil(20/CATS.length)));});
  return shuffle(res).slice(0,20).map(d=>({...d,opz:shuffle(d.o)}));
}

function Risultati({risposte,domande,onRicomincia,onStudia,tipoTest}){

  const tot=domande.length;const totOk=domande.filter(d=>risposte[d.id]===d.ok).length;const pct=Math.round((totOk/tot)*100);

      </div>
    </div>
    <button className="btn tap" onClick={onRicomincia} style={{width:"100%",padding:"14px",borderRadius:14,background:`linear-gradient(135deg,${C.presente.a},${C.condizionale.a})`,color:"white",fontSize:15,boxShadow:`0 4px 16px ${C.presente.a}33`}}>🔄 Nuovo test</button>
  </div>);
}

function App(){
  const [user,setUser]=useState(null);
  const [vista,setVista]=useState("home");
  const [tempoSel,setTempoSel]=useState(null);
  const [tipoTest,setTipoTest]=useState(null);
  const [domande,setDomande]=useState([]);
  const [idx,setIdx]=useState(0);
  const [risposte,setRisposte]=useState({});
  const [scelta,setScelta]=useState(null);
  const [confermata,setConfermata]=useState(false);
  useEffect(()=>{if(user)saveUser(user);},[user]);
  const login=(u)=>{setUser(u);setVista("home");};
  const avviaTest=useCallback((tipo)=>{
    let dq;
    if(tipo==="MIX"){const a=pick20("A").slice(0,10);const b=pick20("B").slice(0,10);dq=shuffle([...a,...b]);}
    else{dq=pick20(tipo);}
    setDomande(dq);setIdx(0);setRisposte({});setScelta(null);setConfermata(false);setTipoTest(tipo);setVista("test");
  },[]);
  const confermaSel=()=>{if(!scelta)return;setConfermata(true);setRisposte(p=>({...p,[domande[idx].id]:scelta}));};
  const avanti=()=>{
    const nr={...risposte,[domande[idx].id]:scelta};
    if(idx<domande.length-1){setIdx(i=>i+1);setScelta(null);setConfermata(false);}
    else{
      const prio=CATS.filter(c=>{const dc=domande.filter(d=>d.cat===c);const ok=dc.filter(d=>nr[d.id]===d.ok).length;return dc.length>0&&Math.round((ok/dc.length)*100)<60;});
      setRisposte(nr);
      setUser(u=>({...u,prioritari:prio,tests:[...(u.tests||[]),{data:Date.now(),tipo:tipoTest,tot:domande.length,ok:domande.filter(d=>nr[d.id]===d.ok).length,stats:Object.fromEntries(CATS.map(c=>{const dc=domande.filter(d=>d.cat===c);const ok=dc.filter(d=>nr[d.id]===d.ok).length;return[c,dc.length>0?Math.round((ok/dc.length)*100):null];}))}]}));
      setVista("risultati");
    }
  };
  const nav=(v)=>{setVista(v);setTempoSel(null);};
  const dom=domande[idx];const tc=dom?TMP[dom.cat]:null;const lastTest=user?.tests?.[user.tests.length-1];
  if(!user)return <LoginScreen onLogin={login}/>;
  return(<div style={{minHeight:"100vh",background:C.bg}}>
    <div style={{position:"sticky",top:0,zIndex:100,background:`${C.white}EE`,backdropFilter:"blur(10px)",borderBottom:`1px solid ${C.border}`,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontFamily:"'Baloo 2',sans-serif",fontSize:18,background:`linear-gradient(135deg,${C.presente.a},${C.condizionale.a})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontWeight:800}}>📝 ConjugaFacile</span>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        {[{id:"home",icon:"🏠"},{id:"studio",icon:"📚"},{id:"scegli-test",icon:"✏️"}].map(n=>(<button key={n.id} className="btn tap" onClick={()=>nav(n.id)} style={{padding:"7px 12px",borderRadius:10,background:vista===n.id||vista==="test"&&n.id==="scegli-test"||vista==="risultati"&&n.id==="scegli-test"?`${C.presente.a}15`:C.surface,border:`1px solid ${vista===n.id||vista==="test"&&n.id==="scegli-test"||vista==="risultati"&&n.id==="scegli-test"?C.presente.a:C.border}`,color:vista===n.id||vista==="test"&&n.id==="scegli-test"||vista==="risultati"&&n.id==="scegli-test"?C.presente.a:C.muted,fontSize:12}}>{n.icon} {n.id==="scegli-test"?"Test":n.id.charAt(0).toUpperCase()+n.id.slice(1)}</button>))}
        <button className="btn tap" onClick={()=>setUser(null)} style={{padding:"7px 12px",borderRadius:10,background:C.surface,border:`1px solid ${C.border}`,color:C.muted,fontSize:12}}>👤 {user.nome}</button>
      </div>
    </div>
    <div style={{maxWidth:640,margin:"0 auto",padding:"16px 14px 32px"}}>

      {vista==="home"&&(<div className="fade-in">
        {user.ultimoAccesso&&(<div className="slide-up card" style={{padding:18,marginBottom:14,borderLeft:`4px solid ${C.presente.a}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
            <div>
              <p style={{fontWeight:800,color:C.text,fontSize:15}}>👋 Bentornata, {user.nome}!</p>
              <p style={{color:C.muted,fontSize:12,marginTop:2}}>Ultimo accesso: {new Date(user.ultimoAccesso).toLocaleDateString("it-IT",{weekday:"short",day:"numeric",month:"long"})}</p>
              {user.prioritari?.length>0&&(<p style={{color:C.congiuntivo.a,fontSize:12,marginTop:4,fontWeight:700}}>⚠️ Da ripassare: {user.prioritari.map(c=>TMP[c].short).join(", ")}</p>)}
            </div>
            {lastTest&&(<div style={{textAlign:"center",background:C.surface,borderRadius:12,padding:"10px 16px"}}><p style={{color:C.muted,fontSize:10,fontWeight:700}}>ULTIMO TEST</p><p style={{fontFamily:"'Baloo 2',sans-serif",color:Math.round((lastTest.ok/lastTest.tot)*100)>=75?C.futuro.a:C.congiuntivo.a,fontSize:24,fontWeight:800}}>{Math.round((lastTest.ok/lastTest.tot)*100)}%</p><p style={{color:C.muted,fontSize:10}}>{lastTest.ok}/{lastTest.tot} corrette</p></div>)}
          </div>
        </div>)}
        {!user.ultimoAccesso&&(<div className="slide-up card" style={{padding:24,marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:54,animation:"float 3s ease-in-out infinite"}}>🎓</div>
          <h2 style={{fontFamily:"'Baloo 2',sans-serif",fontSize:22,color:C.text,margin:"10px 0 8px"}}>Ciao, {user.nome}! 👋</h2>
          <p style={{color:C.muted,fontSize:14,lineHeight:1.7,maxWidth:360,margin:"0 auto 20px"}}>Studia le <strong style={{color:C.text}}>tabelle di coniugazione</strong>, poi fai un test da <strong style={{color:C.text}}>20 domande</strong> e scopri i tuoi punti forti e cosa ripassare!</p>
          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            <button className="btn tap" onClick={()=>nav("studio")} style={{padding:"12px 22px",borderRadius:12,background:`linear-gradient(135deg,${C.presente.a},${C.imperfetto.a})`,color:"white",fontSize:15,boxShadow:`0 4px 14px ${C.presente.a}33`}}>📚 Studia</button>
            <button className="btn tap" onClick={()=>nav("scegli-test")} style={{padding:"12px 22px",borderRadius:12,background:`linear-gradient(135deg,${C.passato.a},${C.congiuntivo.a})`,color:"white",fontSize:15,boxShadow:`0 4px 14px ${C.passato.a}33`}}>✏️ Fai il test</button>
          </div>
        </div>)}
        <p style={{fontSize:11,fontWeight:800,color:C.light,letterSpacing:1,marginBottom:10}}>📖 I 6 TEMPI DA IMPARARE</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          {TEMPI.map(t=>(<div key={t.id} className="tap card" onClick={()=>{setTempoSel(t.id);nav("studio");}} style={{padding:"14px 16px",cursor:"pointer",borderTop:`3px solid ${t.clr.a}`}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:28}}>{t.emoji}</span>{user.lezioniStudiate?.includes(t.id)&&<span>✅</span>}{user.prioritari?.includes(t.id)&&!user.lezioniStudiate?.includes(t.id)&&<span>⚠️</span>}</div><p style={{fontWeight:800,fontSize:13,color:C.text,marginTop:8,lineHeight:1.3}}>{t.nome}</p></div>))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
          {[{icon:"📖",label:"Lezioni",val:`${user.lezioniStudiate?.length||0}/6`},{icon:"✏️",label:"Test fatti",val:user.tests?.length||0},{icon:"🏅",label:"Miglior score",val:user.tests?.length?Math.max(...user.tests.map(t=>Math.round((t.ok/t.tot)*100)))+"%":"—"}].map((s,i)=>(<div key={i} className="card" style={{padding:"12px 10px",textAlign:"center"}}><div style={{fontSize:22}}>{s.icon}</div><p style={{fontWeight:900,color:C.presente.a,fontSize:18,margin:"4px 0 2px"}}>{s.val}</p><p style={{color:C.muted,fontSize:11}}>{s.label}</p></div>))}
        </div>
        {lastTest&&(<div className="card" style={{padding:16}}><p style={{fontSize:11,fontWeight:800,color:C.light,letterSpacing:1,marginBottom:12}}>📈 ANDAMENTO ULTIMO TEST</p>{CATS.map(c=>{const pct=lastTest.stats?.[c];if(!pct&&pct!==0)return null;const t=TMP[c];const col=pct>=75?C.futuro.a:pct>=50?C.congiuntivo.a:C.passato.a;return(<div key={c} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:700,color:C.muted}}>{t.emoji} {t.short}</span><span style={{fontSize:12,fontWeight:900,color:col}}>{pct}%</span></div><PBar value={pct} max={100} color={col} h={6}/></div>);})}</div>)}
      </div>)}

      {vista==="studio"&&!tempoSel&&(<div className="fade-in">
        <h2 style={{fontFamily:"'Baloo 2',sans-serif",fontSize:20,color:C.text,marginBottom:10}}>📚 Scegli cosa studiare</h2>
        {user.prioritari?.length>0&&(<div style={{background:"#FFF7ED",borderRadius:12,padding:14,marginBottom:14,borderLeft:`3px solid ${C.congiuntivo.a}`}}><p style={{fontWeight:800,color:C.congiuntivo.b,fontSize:12,marginBottom:8}}>⚠️ Dall'ultimo test, ti consiglio di ripassare:</p><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{user.prioritari.map(a=>{const t=TMP[a];return(<button key={a} className="btn tap" onClick={()=>setTempoSel(a)} style={{padding:"6px 14px",borderRadius:20,background:t.clr.bg,border:`1px solid ${t.clr.a}44`,color:t.clr.a,fontSize:12,fontWeight:800}}>{t.emoji} {t.short}</button>);})}</div></div>)}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {TEMPI.map(t=>(<div key={t.id} className="card tap" onClick={()=>setTempoSel(t.id)} style={{padding:"16px 18px",cursor:"pointer",borderLeft:`4px solid ${t.clr.a}`,display:"flex",alignItems:"center",gap:14}}><span style={{fontSize:32}}>{t.emoji}</span><div style={{flex:1}}><p style={{fontWeight:900,fontSize:15,color:C.text}}>{t.nome}</p><p style={{fontSize:12,color:C.muted,marginTop:2}}>{t.regola.slice(0,55)}…</p></div><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>{user.lezioniStudiate?.includes(t.id)&&<span style={{fontSize:18}}>✅</span>}{user.prioritari?.includes(t.id)&&<span style={{fontSize:14}}>⚠️</span>}</div><span style={{color:C.border,fontSize:20}}>›</span></div>))}
        </div>
      </div>)}
      {vista==="studio"&&tempoSel&&(<StudioTempo tempo={TMP[tempoSel]} onBack={()=>setTempoSel(null)} prioritario={user.prioritari?.includes(tempoSel)} onStudiato={()=>{setUser(u=>({...u,lezioniStudiate:u.lezioniStudiate.includes(tempoSel)?u.lezioniStudiate:[...u.lezioniStudiate,tempoSel]}));setTempoSel(null);}}/>)}

      {vista==="scegli-test"&&(<SceltiTipoTest onScegli={avviaTest} prioritari={user.prioritari}/>)}

      {vista==="test"&&domande.length>0&&(<div className="fade-in">
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontWeight:800,fontSize:13,color:C.muted}}>Domanda {idx+1}/{domande.length}</span>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <Badge color={tipoTest==="B"?C.condizionale.a:tipoTest==="MIX"?C.futuro.a:C.presente.a} size="sm">{tipoTest==="A"?"Tipo A":tipoTest==="B"?"Tipo B":"Mix"}</Badge>
              <Badge color={tc?.clr.a||C.presente.a} size="sm">{tc?.emoji} {tc?.short}</Badge>
            </div>
          </div>
          <PBar value={idx} max={domande.length} color={tc?.clr.a||C.presente.a} h={8}/>
        </div>
        <div className="card" style={{padding:20,marginBottom:12,borderTop:`3px solid ${tc?.clr.a||C.presente.a}`}}>
          <p style={{fontSize:17,fontWeight:800,color:C.text,lineHeight:1.5,marginBottom:20,whiteSpace:"pre-wrap"}}>{dom.t}</p>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {dom.opz.map((op,i)=>{
              let bg=C.surface,border=`1px solid ${C.border}`,col=C.text,extra=null;
              if(confermata){if(op===dom.ok){bg="#F0FDF4";border=`2px solid ${C.futuro.a}`;col=C.futuro.b;extra="✅";}else if(op===scelta){bg="#FEF2F2";border=`2px solid ${C.wrong}`;col=C.wrong;extra="❌";}else{col=C.light;border=`1px solid ${C.border}`;}}
              else if(op===scelta){bg=tc?.clr.bg||"#EFF8FF";border=`2px solid ${tc?.clr.a||C.presente.a}`;col=tc?.clr.b||C.presente.b;}
              return(<div key={i} className={confermata?"":"tap"} onClick={()=>!confermata&&setScelta(op)} style={{padding:"13px 16px",borderRadius:12,background:bg,border,color:col,fontWeight:700,fontSize:15,cursor:confermata?"default":"pointer",display:"flex",alignItems:"center",gap:12,animation:confermata&&op===dom.ok?"pop .3s ease both":"none",transition:"background .15s,border .15s"}}><span style={{width:28,height:28,borderRadius:"50%",flexShrink:0,background:op===scelta&&!confermata?tc?.clr.a||C.presente.a:C.border,color:op===scelta&&!confermata?"white":C.muted,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:12,transition:"all .15s"}}>{"ABCD"[i]}</span><span style={{flex:1}}>{op}</span>{extra&&<span>{extra}</span>}</div>);
            })}
          </div>
          {confermata&&(<div className="fade-in" style={{marginTop:14,padding:"12px 16px",borderRadius:12,background:scelta===dom.ok?"#F0FDF4":"#FFF7ED",border:`1px solid ${scelta===dom.ok?C.futuro.a:C.congiuntivo.a}44`}}><p style={{fontWeight:800,fontSize:14,color:scelta===dom.ok?C.futuro.b:C.congiuntivo.b}}>{scelta===dom.ok?"🎉 Corretto! Bravissima!":`💪 La risposta giusta era: "${dom.ok}"`}</p></div>)}
        </div>
        {!confermata?(<button className="btn tap" onClick={confermaSel} disabled={!scelta} style={{width:"100%",padding:"14px",borderRadius:14,background:scelta?`linear-gradient(135deg,${tc?.clr.a||C.presente.a},${tc?.clr.b||C.presente.b})`:C.surface,border:scelta?"none":`1px solid ${C.border}`,color:scelta?"white":C.muted,fontSize:16,boxShadow:scelta?`0 4px 16px ${tc?.clr.a||C.presente.a}33`:"none"}}>Conferma risposta ✓</button>):(<button className="btn tap" onClick={avanti} style={{width:"100%",padding:"14px",borderRadius:14,background:`linear-gradient(135deg,${C.congiuntivo.a},${C.condizionale.a})`,color:"white",fontSize:16,boxShadow:`0 4px 16px ${C.congiuntivo.a}33`}}>{idx<domande.length-1?"Prossima domanda →":"🏆 Vedi i risultati!"}</button>)}
        <div style={{marginTop:12,display:"flex",gap:4,justifyContent:"center",flexWrap:"wrap"}}>
          {domande.map((d,i)=>{const r=risposte[d.id];const st=r===undefined?(i===idx?"active":"empty"):r===d.ok?"ok":"no";return(<div key={i} style={{width:16,height:16,borderRadius:4,background:st==="ok"?C.futuro.a:st==="no"?C.passato.a:st==="active"?C.presente.a:C.border,transition:"background .2s"}}/>);})}
        </div>
      </div>)}

      {vista==="risultati"&&domande.length>0&&(<Risultati risposte={risposte} domande={domande} onRicomincia={()=>nav("scegli-test")} onStudia={(id)=>{setTempoSel(id);nav("studio");}} tipoTest={tipoTest}/>)}

    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
